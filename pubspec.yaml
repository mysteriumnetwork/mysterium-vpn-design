name: mysterium_vpn_design
description: "Design system used in the MysteriumVPN app"
version: 0.0.4

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: 3.41.9

dependencies:
  collection: 1.19.1
  flutter:
    sdk: flutter
  flutter_svg: 2.3.0
  google_fonts: 8.1.0
  lottie: 3.3.3

dev_dependencies:
  flutter_lints: 6.0.0
  flutter_test:
    sdk: flutter

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
  fonts:
    - family: UntitledUI
      fonts:
        - asset: assets/fonts/UntitledUI.ttf
